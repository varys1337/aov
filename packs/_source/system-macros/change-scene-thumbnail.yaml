command: |-
  const data = await foundry.applications.api.DialogV2.input({
    window: { title: "Scene UUID" },
    content: `<input type="text" name="scnuuid">`,
    ok: {
      label: "Save",
      icon: "fa-solid fa-floppy-disk",
    }
  })
  let scene = await fromUuid(data.scnuuid)
  let oldPath = scene.thumb.split("scenes/")[1]
  oldPath = oldPath.split(".webp")[0]
  let newPath = "modules/cha-aov-fvtt-en-thecursedfarm/art/"+oldPath+".webp"
  await scene.update({'thumb': newPath})
  console.log("Scene Thumb updated to " + newPath)
