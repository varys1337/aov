  - _key: '!journal.pages!fmAbF04foYlYRFiE.whxZ0KQeXQf12ttH'
    _id: whxZ0KQeXQf12ttH
    name: Character Creation
    type: text
    _stats:
      coreVersion: '14.364'
      createdTime: 1759255593764
      duplicateSource: null
      exportSource: null
      lastModifiedBy: PackAgeOfVikings
      modifiedTime: 1781939412026
      systemId: aov
      systemVersion: '13.14'
    category: null
