    text:
      content: "<p>The instructions for the game are over on the wiki for the Age of Vikings Foundry system. You can find them at:</p><p>\_</p><p><a href=\"https://github.com/cragstone/aov/wiki\">Home · cragstone/aov Wiki</a></p><p>\_</p><p>By keeping them outside of the Foundry system it will allow for more rapid and frequent updates without the constant need to refresh the game system.</p><p>\_</p><p>Any suggestions for new pages, updates, corrections then please contact us via Github or the Chaosium Discord server.</p><p></p>"
